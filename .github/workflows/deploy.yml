name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KB_PATH: ${{ github.workspace }}/.cache/knowledge-base
      NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
      NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
      NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}
      NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
      KB_REPO_TOKEN: ${{ secrets.KB_REPO_TOKEN }}

    steps:
      - name: Checkout site
        uses: actions/checkout@v7

      - name: Checkout private KB
        if: ${{ env.KB_REPO_TOKEN != '' }}
        uses: actions/checkout@v7
        with:
          repository: R3gardless/KNOWLEDGE_BASE
          token: ${{ env.KB_REPO_TOKEN }}
          path: .cache/knowledge-base

      - name: Require private KB token
        if: ${{ env.KB_REPO_TOKEN == '' }}
        run: |
          echo "::error::KB_REPO_TOKEN secret is required to deploy with the private KB repository."
          exit 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

      - name: Preserve GitHub Pages static assets
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          static_site_generator: next

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
