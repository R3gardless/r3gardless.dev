name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KNOWLEDGE_BASE_PATH: ${{ github.workspace }}/.cache/knowledge-base
      NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
      NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
      NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}
      NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
      KNOWLEDGE_BASE_TOKEN: ${{ secrets.KNOWLEDGE_BASE_TOKEN }}

    steps:
      - name: Checkout site
        uses: actions/checkout@v7

      - name: Checkout private KNOWLEDGE_BASE
        if: ${{ env.KNOWLEDGE_BASE_TOKEN != '' }}
        uses: actions/checkout@v7
        with:
          repository: R3gardless/KNOWLEDGE_BASE
          token: ${{ env.KNOWLEDGE_BASE_TOKEN }}
          path: .cache/knowledge-base

      - name: Require private KNOWLEDGE_BASE token
        if: ${{ env.KNOWLEDGE_BASE_TOKEN == '' }}
        run: |
          echo "::error::KNOWLEDGE_BASE_TOKEN secret is required to deploy with the private KNOWLEDGE_BASE repository."
          exit 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # verify의 `bun run build`(next build)가 prebuild 훅(build:content && build:meta)을
      # 태워, 방금 checkout한 최신 KNOWLEDGE_BASE로 content/posts·postMeta를 재생성합니다.
      # 별도 명시 단계는 중복이라 두지 않습니다.
      - name: Verify
        run: bun run verify

      - name: Preserve GitHub Pages static assets
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          static_site_generator: next

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
