name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      KB_PATH: ${{ github.workspace }}/.cache/knowledge-base
      NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
      NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
      NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}
      NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
      KB_REPO_TOKEN: ${{ secrets.KB_REPO_TOKEN }}

    steps:
      - name: Checkout site
        uses: actions/checkout@v7

      - name: Checkout private KB
        if: ${{ env.KB_REPO_TOKEN != '' }}
        uses: actions/checkout@v7
        with:
          repository: R3gardless/KNOWLEDGE_BASE
          token: ${{ env.KB_REPO_TOKEN }}
          path: .cache/knowledge-base

      - name: Use fixture KB when private KB token is unavailable
        if: ${{ env.KB_REPO_TOKEN == '' }}
        run: echo "KB_PATH=${{ github.workspace }}/tests/fixtures/kb/KNOWELDGE_BASE" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify
