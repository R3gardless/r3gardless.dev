name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # 로컬 `bun run verify`와 동일한 하네스를 그대로 실행합니다.
  # (types:check → lint:check → format:check → test:unit:run → build →
  #  check-content → check-repo → smoke:out → check-links)
  verify:
    runs-on: ubuntu-latest
    env:
      KNOWLEDGE_BASE_PATH: ${{ github.workspace }}/.cache/knowledge-base
      NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
      NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
      NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}
      NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
      KNOWLEDGE_BASE_TOKEN: ${{ secrets.KNOWLEDGE_BASE_TOKEN }}

    steps:
      - name: Checkout site
        uses: actions/checkout@v7

      - name: Require private KNOWLEDGE_BASE token
        if: ${{ env.KNOWLEDGE_BASE_TOKEN == '' }}
        run: |
          echo "::error::KNOWLEDGE_BASE_TOKEN secret is required to verify with the private KNOWLEDGE_BASE repository."
          exit 1

      - name: Checkout private KNOWLEDGE_BASE
        uses: actions/checkout@v7
        with:
          repository: R3gardless/KNOWLEDGE_BASE
          token: ${{ env.KNOWLEDGE_BASE_TOKEN }}
          path: .cache/knowledge-base

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify (full harness)
        run: bun run verify
