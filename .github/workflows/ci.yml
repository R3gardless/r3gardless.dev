name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # 빠른 정적 검사 게이트(타입/린트/포맷). 실패 시 무거운 verify 전에 조기 종료합니다.
  lint-build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
      NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
      NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}
      NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}

    steps:
      - name: Checkout site
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run types:check

      - name: ESLint check
        run: bun run lint:check

      - name: Prettier check
        run: bun run format:check

  # 로컬 `bun run verify`와 동일한 전체 하네스. lint-build 통과 후 실행합니다.
  # (types:check → lint:check → format:check → test:unit:run → build →
  #  check-content → check-repo → smoke:out → check-links)
  verify:
    needs: lint-build
    runs-on: ubuntu-latest
    env:
      KNOWLEDGE_BASE_PATH: ${{ github.workspace }}/.cache/knowledge-base
      NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
      NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
      NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}
      NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
      KNOWLEDGE_BASE_TOKEN: ${{ secrets.KNOWLEDGE_BASE_TOKEN }}

    steps:
      - name: Checkout site
        uses: actions/checkout@v7

      - name: Require private KNOWLEDGE_BASE token
        if: ${{ env.KNOWLEDGE_BASE_TOKEN == '' }}
        run: |
          echo "::error::KNOWLEDGE_BASE_TOKEN secret is required to verify with the private KNOWLEDGE_BASE repository."
          exit 1

      - name: Checkout private KNOWLEDGE_BASE
        uses: actions/checkout@v7
        with:
          repository: R3gardless/KNOWLEDGE_BASE
          token: ${{ env.KNOWLEDGE_BASE_TOKEN }}
          path: .cache/knowledge-base

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify (full harness)
        run: bun run verify

  # 브랜치 보호가 요구하는 별도 필수 체크. 단위 테스트만 빠르게 재확인합니다.
  unit-test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
      NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
      NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}
      NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}

    steps:
      - name: Checkout site
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests (with coverage)
        run: bun run test:unit:coverage

      # codecov.yml의 80% 목표를 실제로 게이트하기 위해 커버리지를 업로드합니다.
      # public repo는 tokenless 업로드가 가능하지만, rate limit 회피를 위해
      # CODECOV_TOKEN secret이 있으면 사용합니다.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: unit-tests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
